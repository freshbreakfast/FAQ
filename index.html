<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FAQ</title>

<style>
body{
  margin:0;
  font-family: Arial, "Noto Sans TC", sans-serif;
  background:#fff;
}

/* FAQ 容器 */
.faq-wrap{
  max-width:900px;
  margin:40px auto;
  padding:0 16px;
}

/* 常見問題一覽 + 右側操作 */
.faq-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
}

.faq-title{
  font-size:20px;
  font-weight:600;
}

/* 右側「點擊問題」 */
.faq-action{
  font-size:14px;
  color:#666;
  cursor:pointer;
}

/* FAQ item */
.faq-item{
  border-bottom:1px solid #eee;
}

.faq-q{
  padding:14px 10px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.faq-a{
  display:none;
  padding:0 10px 14px 10px;
  color:#555;
  font-size:14px;
}

/* Q5 特別樣式（淺灰底） */
.faq-item.q5 .faq-q{
  background:#f2f2f2;
  border-radius:6px;
  margin:6px 0;
}
</style>
</head>

<body>

<div class="faq-wrap">

  <!-- 常見問題一覽（無多餘標題行） -->
  <div class="faq-header">
    <div class="faq-title">常見問題一覽</div>
    <div class="faq-action">點擊問題查看</div>
  </div>

  <!-- Q1 -->
  <div class="faq-item">
    <div class="faq-q">Q1：問題標題範例</div>
    <div class="faq-a">這裡放 Q1 的內容說明。</div>
  </div>

  <!-- Q2（已依需求簡化/移除不適合宅配描述） -->
  <div class="faq-item">
    <div class="faq-q">Q2：問題標題範例</div>
    <div class="faq-a">這裡放 Q2 的內容（已刪除不需要的宅配相關內容）。</div>
  </div>

  <!-- Q3 -->
  <div class="faq-item">
    <div class="faq-q">Q3：問題標題範例</div>
    <div class="faq-a">這裡放 Q3 的內容說明。</div>
  </div>

  <!-- Q4 -->
  <div class="faq-item">
    <div class="faq-q">Q4：問題標題範例</div>
    <div class="faq-a">這裡放 Q4 的內容說明。</div>
  </div>

  <!-- Q5（客服電話｜淺灰底） -->
  <div class="faq-item q5">
    <div class="faq-q">Q5：撥打客服電話</div>
    <div class="faq-a">請撥打客服專線：XXXX-XXXXXX</div>
  </div>

</div>

<script>
document.querySelectorAll('.faq-q').forEach(q=>{
  q.addEventListener('click',()=>{
    const a = q.nextElementSibling;
    a.style.display = (a.style.display === 'block') ? 'none' : 'block';
  });
});
</script>

</body>
</html>
