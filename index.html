<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>鮮到味｜常見問題 FAQ</title>

<style>
:root{
  --brand-red:#d91f26;
  --brand-red-dark:#b8141b;
  --brand-red-soft:#ff6a4d;
  --brand-black:#161616;
  --text:#1f2937;
  --sub:#6b7280;
  --card:#ffffff;
  --border:#f5eee8;
  --shadow-soft:0 8px 20px rgba(0,0,0,.06);
  --radius:22px;
}

/* base */
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
  color:var(--text);
  line-height:1.7;
  background:linear-gradient(180deg, #fffdfa 0%, #fff7f0 100%);
}

.wrap{
  width:min(92%, 980px);
  margin:24px auto 120px;
}

/* hero */
.faq-hero{
  background:linear-gradient(135deg,#232323 0%,#2b2b2b 40%,var(--brand-red) 100%);
  border-radius:30px;
  padding:28px 22px;
  color:#fff;
  margin-bottom:18px;
}

.hero-title{
  margin:14px 0 8px;
  font-size:28px;
  font-weight:900;
}

.hero-desc{
  margin:0;
  font-size:14px;
  opacity:.9;
}

.hero-tags{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:16px;
}

.hero-tag{
  background:rgba(255,255,255,.12);
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
}

/* section */
.section-head{
  display:flex;
  justify-content:space-between;
  margin:10px 0 16px;
}

.section-title{
  margin:0;
  font-size:22px;
  font-weight:900;
}

/* card */
.card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow-soft);
  margin-bottom:14px;
  overflow:hidden;
}

summary{
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  padding:18px;
  font-weight:900;
}

summary::-webkit-details-marker{display:none;}

.summary-left{
  display:flex;
  gap:12px;
  align-items:center;
}

.q-tag{
  width:38px;
  height:38px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,var(--brand-red),var(--brand-red-soft));
  color:#fff;
  font-weight:900;
  font-size:13px;
}

.arrow{
  width:34px;
  height:34px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  background:#fff6f0;
}

/* content */
.content{
  padding:0 18px 18px;
  color:#4b5563;
}

/* step */
.step-list{
  list-style:none;
  padding:0;
  display:grid;
  gap:12px;
}

.step-list li{
  display:flex;
  gap:12px;
  padding:12px;
  background:#fffdf9;
  border:1px solid #f3e8df;
  border-radius:14px;
}

/* ✅ 修改：淺黃數字 */
.step-num{
  width:28px;
  height:28px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#ffe9a8;
  color:#7a5a00;
  font-weight:900;
}

/* sub box */
.sub-box{
  background:#fffdfb;
  border:1px solid #f3e8df;
  border-radius:18px;
  padding:14px;
  margin-top:12px;
}

/* contact */
.contact-card{
  background:#fffdfb;
  border:1px solid #f3e8df;
  border-radius:18px;
  padding:16px;
}

/* button */
.btn{
  display:block;
  padding:12px;
  border-radius:12px;
  text-align:center;
  font-weight:900;
  text-decoration:none;
  margin-top:10px;
}

.btn-primary{
  background:linear-gradient(135deg,var(--brand-red),var(--brand-red-soft));
  color:#fff;
}

.btn-line{
  background:#06c755;
  color:#fff;
}

/* footer */
.footer{
  margin-top:24px;
  padding:20px;
  border-radius:18px;
  background:#fffaf7;
  border:1px solid #f3e8df;
}
</style>
</head>

<body id="top">

<main class="wrap">

  <!-- HERO -->
  <section class="faq-hero">
    <h1 class="hero-title">常見問題 FAQ</h1>
    <p class="hero-desc">
      整理訂購、團購、保存與聯絡資訊，方便快速查詢
    </p>
    <div class="hero-tags">
      <span class="hero-tag">團購</span>
      <span class="hero-tag">保存</span>
      <span class="hero-tag">客服</span>
    </div>
  </section>

  <div class="section-head">
    <h2 class="section-title">常見問題一覽</h2>
  </div>

  <!-- Q1 -->
  <div class="card">
    <details>
      <summary>
        <div class="summary-left">
          <span class="q-tag">Q1</span>
          店家購物流程
        </div>
        <span class="arrow">▼</span>
      </summary>
      <div class="content">
        <ul class="step-list">
          <li><span class="step-num">1</span>提供店家資訊</li>
          <li><span class="step-num">2</span>提供產品數量</li>
          <li><span class="step-num">3</span>取得報價</li>
        </ul>
      </div>
    </details>
  </div>

  <!-- Q2 -->
  <div class="card">
    <details>
      <summary>
        <div class="summary-left">
          <span class="q-tag">Q2</span>
          團購購物流程
        </div>
        <span class="arrow">▼</span>
      </summary>
      <div class="content">
        <div class="sub-box">門市取貨</div>
        <div class="sub-box">超商配送</div>
      </div>
    </details>
  </div>

  <!-- Q3 -->
  <div class="card">
    <details>
      <summary>
        <div class="summary-left">
          <span class="q-tag">Q3</span>
          保存方式
        </div>
        <span class="arrow">▼</span>
      </summary>
      <div class="content">
        <div class="sub-box">冷藏 / 冷凍說明</div>
      </div>
    </details>
  </div>

  <!-- Q4 -->
  <div class="card">
    <details>
      <summary>
        <div class="summary-left">
          <span class="q-tag">Q4</span>
          營業時間
        </div>
        <span class="arrow">▼</span>
      </summary>
      <div class="content">
        <div class="sub-box">平日 / 假日時間</div>
      </div>
    </details>
  </div>

  <!-- Q5 -->
  <div class="card">
    <details>
      <summary>
        <div class="summary-left">
          <span class="q-tag">Q5</span>
          聯絡資訊
        </div>
        <span class="arrow">▼</span>
      </summary>
      <div class="content">
        <div class="contact-card">
          電話 / LINE / 地址
        </div>
      </div>
    </details>
  </div>

  <!-- Q6 -->
  <div class="card">
    <details>
      <summary>
        <div class="summary-left">
          <span class="q-tag">Q6</span>
          食安聲明
        </div>
        <span class="arrow">▼</span>
      </summary>
      <div class="content">
        <div class="sub-box">食品安全說明文件</div>
      </div>
    </details>
  </div>

  <!-- footer -->
  <div class="footer">
    鮮到味 FAQ
  </div>

</main>
</body>
</html>
